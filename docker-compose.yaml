services:
  db:
      image: mysql:latest
      container_name: epiportal-db
      restart: always
      env_file:
          - ./.env
      environment:
          MYSQL_DATABASE: ${MYSQL_DATABASE}
          MYSQL_USER: ${MYSQL_USER}
          MYSQL_PASSWORD: ${MYSQL_PASSWORD}
          MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      volumes:
          - mysql:/var/lib/mysql/
      ports:
          - "3306:3306"
      healthcheck:
          test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
          interval: 5s
          timeout: 5s
          retries: 10
          start_period: 30s

  redis:
      image: redis:latest
      container_name: epiportal-redis
      restart: always
      volumes:
          - redis:/data
      ports:
          - "6379:6379"

  # Production service - "service", "image", and "container_name" should all contain the same
  # reference based on the name of the service.
  epwebapp:
      image: ${REGISTRY}epiportal-epwebapp${TAG}
      build:
          context: .

      env_file:
          - ./.env
      environment:
          MYSQL_HOST: db
          REDIS_HOST_NAME: redis
      container_name: epiportal-epwebapp
      restart: on-failure
      command: sh -c  "python3 /usr/src/epiportal/src/manage.py migrate --noinput &&
                       python3 /usr/src/epiportal/src/manage.py collectstatic --noinput &&
                       python3 /usr/src/epiportal/src/manage.py loaddata ./fixtures/*.json &&
                       python3 /usr/src/epiportal/src/manage.py initadmin &&
                       python3 /usr/src/epiportal/src/manage.py runserver 0.0.0.0:8000"
      volumes:
          - .:/usr/src/epiportal
      ports:
          - "8000:8000"
      depends_on:
          db:
              condition: service_healthy
          redis:
              condition: service_started

  test:
      image: ${REGISTRY}epiportal-epwebapp${TAG}
      build:
          context: .
      env_file:
          - ./.env
      environment:
          MYSQL_HOST: db
          REDIS_HOST_NAME: redis
      volumes:
          - .:/usr/src/epiportal
      working_dir: /usr/src/epiportal/src
      depends_on:
          db:
              condition: service_healthy
          redis:
              condition: service_started
      profiles:
          - test
      command: >
          sh -c "mysql -h db -uroot -p$$MYSQL_ROOT_PASSWORD -e
          \"GRANT ALL PRIVILEGES ON \\\`test_%\\\`.* TO '$$MYSQL_USER'@'%'; FLUSH PRIVILEGES;\"
          && python3 manage.py test
          base datasources indicators indicatorsets alternative_interface epiportal
          --verbosity=1"

  # Production service - "service", "image", and "container_name" should all contain the same
  # reference, based on the name of the service.
  epnginx:
      image: ${REGISTRY}epiportal-epnginx${TAG}
      build: ./nginx
      env_file:
          - ./.env
      container_name: epiportal-epnginx
      restart: on-failure
      volumes:
          - ./src/staticfiles:/staticfiles
      ports:
          - "80:80"
      depends_on:
          - epwebapp

volumes:
    mysql:
    redis:
    epwebapp:
    static:
